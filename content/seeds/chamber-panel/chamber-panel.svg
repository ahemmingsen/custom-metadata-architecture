<?xml version="1.0" encoding="UTF-8"?>
<svg
  viewBox="0 0 120 120"
  xmlns="http://www.w3.org/2000/svg"
  aria-hidden="true"
>
  <defs>
    <linearGradient id="chamberVein" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7fffd4" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#40e0d0" stop-opacity="0.2" />
    </linearGradient>
