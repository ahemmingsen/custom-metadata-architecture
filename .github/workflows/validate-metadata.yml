name: Metadata Architecture Guardrail

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-assets:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set Up Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Validation Frameworks
      run: npm install

    - name: Run Schema Integrity Check
      run: npm run validate
